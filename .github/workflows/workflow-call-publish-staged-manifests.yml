name: Publish Staged Image Manifests

on:
  workflow_call:
    inputs:
      tags:
        description: 'JSON array of image tags (without registry) to publish manifests for'
        type: string
        required: true
      arches:
        description: 'JSON array of architecture suffixes used in per-arch tags'
        type: string
        required: false
        default: '["x86_64","aarch64","s390x"]'
      ghcr_token:
        description: "Token for GHCR push"
        type: string
        required: true

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJSON(inputs.tags) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ inputs.ghcr_token }}

      - name: Publish multi-arch manifest
        shell: bash
        env:
          INPUT_ARCHES: ${{ inputs.arches }}
          IMAGE_TAG: ${{ matrix.tag }}
        run: |
          set -euo pipefail
          commit_sha="${GITHUB_SHA}"

          manifest_args=()
          latest_args=()
          for arch in $(jq -r '.[]' <<<"${INPUT_ARCHES}"); do
            manifest_args+=(--amend "ghcr.io/confidential-containers/staged-images/${IMAGE_TAG}:${commit_sha}-${arch}")
            latest_args+=(--amend "ghcr.io/confidential-containers/staged-images/${IMAGE_TAG}:latest-${arch}")
          done

          docker manifest create "ghcr.io/confidential-containers/staged-images/${IMAGE_TAG}:${commit_sha}" "${manifest_args[@]}"
          docker manifest push "ghcr.io/confidential-containers/staged-images/${IMAGE_TAG}:${commit_sha}"

          docker manifest create "ghcr.io/confidential-containers/staged-images/${IMAGE_TAG}:latest" "${latest_args[@]}"
          docker manifest push "ghcr.io/confidential-containers/staged-images/${IMAGE_TAG}:latest"
