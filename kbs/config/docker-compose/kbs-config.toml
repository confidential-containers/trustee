[http_server]
sockets = ["0.0.0.0:8080"]
insecure_http = true

[attestation_token]
trusted_certs_paths = ["/opt/confidential-containers/kbs/user-keys/ca-cert.pem"]

[attestation_service]
type = "coco_as_grpc"
as_addr = "http://as:50004"

[admin]
mode = "Enforce"

[admin.token_verifier]
type = "BearerJwt"
signer_pairs = [{ issuer = "admin", public_key_path = "/opt/confidential-containers/kbs/user-keys/public.pub" }]

[admin.authorizer]
type = "RegexAcl"
roles = [{ subject = "admin", allowed_endpoints = "^/kbs/.+$" }]

[[plugins]]
name = "resource"
type = "LocalFs"
dir_path = "/opt/confidential-containers/kbs/repository"
