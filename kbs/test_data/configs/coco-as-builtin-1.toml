[attestation_service]
type = "coco_as_builtin"
timeout = 5

[attestation_service.attestation_token_broker]
issuer_name = "CoCo-Attestation-Service"
duration_min = 5

[attestation_service.rvps_config]
type = "GrpcRemote"
address = "http://127.0.0.1:50003"

[http_server]
sockets = ["127.0.0.1:8080"]
insecure_http = false

[admin]
mode = "DenyAll"

[storage_backend]
storage_type = "local_json"
backends.local_json.file_dir_path = "/opt/confidential-containers/trustee"
