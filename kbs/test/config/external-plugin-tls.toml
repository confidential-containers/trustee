[http_server]
sockets = ["127.0.0.1:8086"]
insecure_http = true

[admin]
type = "InsecureAllowAll"

[attestation_service]
type = "coco_as_builtin"

[attestation_service.rvps_config]
type = "BuiltIn"

[[plugins]]
name = "external"
backends = [
  { name = "echo-test", endpoint = "https://127.0.0.1:50052", tls_mode = "tls", ca_cert_path = "./work/echo-plugin-ca.pem", timeout_ms = 5000 },
]
