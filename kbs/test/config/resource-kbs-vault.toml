[http_server]
sockets = ["127.0.0.1:50003"]
insecure_http = true

[admin]
auth_public_key = "./work/kbs.pem"

[attestation_token]
trusted_certs_paths = ["./work/ca-cert.pem"]

[policy_engine]
policy_path = "./work/kbs-policy.rego"

[[plugins]]
name = "resource"
type = "Vault"
vault_url = "http://127.0.0.1:8200"
token = "VAULT_TOKEN_PLACEHOLDER"
mount_path = "secret"
verify_ssl = false

