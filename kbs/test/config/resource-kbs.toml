[http_server]
sockets = ["127.0.0.1:50002"]
insecure_http = true

[admin]
mode = "Enforce"

[admin.token_verifier]
type = "BearerJwt"
signer_pairs = [{ issuer = "admin", public_key_path = "./work/kbs.pem" }]

[admin.authorizer]
type = "RegexAcl"
roles = [{ subject = "admin", allowed_endpoints = "^/kbs/.+$" }]

[attestation_token]
trusted_certs_paths = ["./work/ca-cert.pem"]

[policy_engine]
policy_path = "./work/kbs-policy.rego"

[[plugins]]
name = "resource"
type = "LocalFs"
dir_path = "./work/repository"
