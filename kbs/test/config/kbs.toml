[http_server]
sockets = ["127.0.0.1:8080"]
private_key = "./work/https.key"
certificate = "./work/https.crt"
insecure_http = false

[attestation_token]
trusted_certs_paths = ["./work/ca-cert.pem"]

[attestation_service]
type = "coco_as_builtin"

[attestation_service.attestation_token_broker]
duration_min = 5

[attestation_service.attestation_token_broker.signer]
key_path = "./work/token.key"
cert_path = "./work/token-cert-chain.pem"

[attestation_service.rvps_config]
type = "BuiltIn"

[attestation_service.verifier_config.tpm_verifier]
trusted_ak_keys_dir = "./work/attestation-service/tpm_trusted_keys"
max_trusted_ak_keys = 100

[storage_backend]
storage_type = "LocalFs"

[storage_backend.backends.local_fs]
dir_path = "./work/storage"

[admin]
mode = "TokenAuthorization"

[admin.token_verifier]
type = "BearerJwt"
idps = [{ issuer = "admin", public_key_uri = "./work/kbs.pem" }]

[admin.authorizer]
type = "RegexAcl"
acls = [{ audience = "admin", allowed_endpoints = "^/kbs/.+$" }]

[[plugins]]
name = "resource"
type = "kvstorage"
