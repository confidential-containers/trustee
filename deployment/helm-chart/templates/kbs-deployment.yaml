{{- if not .Values.secrets.useEphemeralGeneratedKeys }}
{{- $_ := required "secrets.existingSecretName must be set when secrets.useEphemeralGeneratedKeys is false" (trim (default "" .Values.secrets.existingSecretName)) }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coco-trustee.names.kbs" . }}
  labels:
    {{- include "coco-trustee.labels" . | nindent 4 }}
spec:
  replicas: {{ default 1 .Values.kbs.replicaCount }}
  selector:
    matchLabels:
      app: kbs
      {{- include "coco-trustee.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.kbs.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: kbs
        {{- include "coco-trustee.selectorLabels" . | nindent 8 }}
    spec:
{{- include "coco-trustee.podHostAliases" . | nindent 6 }}
      {{- with .Values.kbs.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      {{- with .Values.kbs.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-as
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              until nc -z -w 2 {{ include "coco-trustee.names.as" . }} {{ include "coco-trustee.port.as" . }}; do
                echo "waiting for AS at {{ include "coco-trustee.names.as" . }}:{{ include "coco-trustee.port.as" . }}";
                sleep 2;
              done
      containers:
        - name: kbs
          {{- $st := include "coco-trustee.storage.type" . | trim }}
          {{- $sst := include "coco-trustee.kbs.sessionStorageType" . | trim }}
          {{- $needLocalFs := or (eq $st "LocalFs") (eq $st "local_fs") (eq $sst "LocalFs") (eq $sst "local_fs") }}
          {{- $needLocalJson := or (eq $st "LocalJson") (eq $st "local_json") (eq $sst "LocalJson") (eq $sst "local_json") }}
          {{- $needDataVolume := or $needLocalFs $needLocalJson }}
          securityContext:
            {{- include "coco-trustee.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.kbs.image.repository }}:{{ .Values.kbs.image.tag }}"
          imagePullPolicy: {{ .Values.kbs.image.pullPolicy }}
          command:
            - "/usr/local/bin/kbs"
            - "--config-file"
            - "/etc/kbs/kbs-config.toml"
          env:
            - name: RUST_LOG
              value: {{ .Values.log_level }}
            {{- $pgurl := include "coco-trustee.postgresUrlSecretName" . | trim }}
            {{- $storageBackendIsPostgres := include "coco-trustee.storage.storageBackendIsPostgres" . | trim }}
            {{- $kbsSessionStorageIsPostgres := include "coco-trustee.kbs.sessionStorageIsPostgres" . | trim }}
            {{- if or ($storageBackendIsPostgres | default false) ($kbsSessionStorageIsPostgres | default false) }}
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ $pgurl }}
                  key: {{ include "coco-trustee.postgresUrlSecretKey" . }}
            {{- end }}
            {{- if eq (include "coco-trustee.storage.needsRedis" . | trim) "true" }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "coco-trustee.redisUrlSecretName" . | trim }}
                  key: {{ include "coco-trustee.redisUrlSecretKey" . }}
            {{- end }}
            {{- with .Values.kbs.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ include "coco-trustee.port.kbs" . }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- with .Values.kbs.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/kbs
            - name: user-keys
              mountPath: /opt/confidential-containers/kbs/user-keys
            {{- if $needLocalFs }}
            - name: data
              mountPath: {{ include "coco-trustee.storage.kbsLocalDir" . }}
            {{- end }}
            {{- if $needLocalJson }}
            - name: data
              mountPath: {{ include "coco-trustee.storage.localJsonDir" . }}
            {{- end }}
            - name: nebula-ca
              mountPath: /opt/confidential-containers/kbs/nebula-ca
            {{- with .Values.kbs.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- range .Values.kbs.resourceRepository }}
            - name: "{{ .repoName }}-{{ .type }}"
              mountPath: "/opt/confidential-containers/kbs/repository/{{ .repoName }}/{{ .type }}"
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "coco-trustee.names.kbsConfig" . }}
        - name: user-keys
          secret:
            secretName: {{ include "coco-trustee.userKeysSecretNameResolved" . | trim }}
{{- include "coco-trustee.userKeysSecretVolumeItems" . | nindent 12 }}
        {{- if $needDataVolume }}
        {{- $kbsClaim := include "coco-trustee.persistence.kbsDataClaimName" . | trim }}
        - name: data
        {{- if $kbsClaim }}
          persistentVolumeClaim:
            claimName: {{ $kbsClaim }}
        {{- else }}
          emptyDir: {}
        {{- end }}
        {{- end }}
        - name: nebula-ca
          emptyDir: {}
        {{- with .Values.kbs.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- range .Values.kbs.resourceRepository }}
        - name: "{{ .repoName }}-{{ .type }}"
          secret:
            secretName: {{ .secretName }}
        {{- end }}
      {{- with .Values.kbs.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kbs.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.kbs.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
