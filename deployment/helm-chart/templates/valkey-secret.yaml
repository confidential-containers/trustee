{{- if eq (include "coco-trustee.valkey.useBitnami" . | trim) "true" }}
{{- if not .Values.valkey.enabled }}
{{- fail "Valkey is required (storageBackend.type or sessionStorageType is Redis with mode=internal) but valkey.enabled is false. Set valkey.enabled=true (see scenarios/valkey-sessions.yaml)." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coco-trustee.valkey.internalSecretName" . }}
  labels:
    {{- include "coco-trustee.labels" . | nindent 4 }}
type: Opaque
stringData:
  REDIS_URL: {{ include "coco-trustee.valkey.internalUrl" . | quote }}
{{- end }}
