{{- if eq (include "coco-trustee.postgres.useBitnami" . | trim) "true" }}
{{- if not .Values.postgresql.enabled }}
{{- fail "PostgreSQL is required (storageBackend.type or sessionStorageType is Postgres with mode=internal) but postgresql.enabled is false. Set postgresql.enabled=true (see scenarios/postgres-backend.yaml)." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coco-trustee.postgres.internalSecretName" . }}
  labels:
    {{- include "coco-trustee.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ include "coco-trustee.postgres.internalUser" . | quote }}
  POSTGRES_PASSWORD: {{ include "coco-trustee.postgres.internalPassword" . | quote }}
  POSTGRES_DB: {{ include "coco-trustee.postgres.internalDatabase" . | quote }}
  POSTGRES_URL: {{ printf "postgresql://%s:%s@%s:%s/%s?sslmode=disable" (include "coco-trustee.postgres.internalUser" .) (include "coco-trustee.postgres.internalPassword" .) (include "coco-trustee.svc.postgres" .) (include "coco-trustee.port.postgres" .) (include "coco-trustee.postgres.internalDatabase" .) | quote }}
{{- end }}
